(function(){
  window.storage = {
    get: async function(k){ try{ var v=localStorage.getItem(k); return v===null?null:{value:v}; }catch(e){ return null; } },
    set: async function(k,val){ try{ localStorage.setItem(k,val); return true; }catch(e){ return false; } },
    list: async function(prefix){ var keys=[]; try{ for(var i=0;i<localStorage.length;i++){ var key=localStorage.key(i); if(key && key.indexOf(prefix)===0) keys.push(key);} }catch(e){} return {keys:keys}; },
    delete: async function(k){ try{ localStorage.removeItem(k); return true; }catch(e){ return false; } }
  };
})();

function downscale(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const max = 360;
                let { width, height } = img;
                if (width > height && width > max) {
                    height = (height * max) / width;
                    width = max;
                }
                else if (height > max) {
                    width = (width * max) / height;
                    height = max;
                }
                const cv = document.createElement("canvas");
                cv.width = width;
                cv.height = height;
                cv.getContext("2d").drawImage(img, 0, 0, width, height);
                resolve(cv.toDataURL("image/jpeg", 0.5));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

/* Seed demo data: 10 days of sample reports for the sample staff (runs once, only if empty) */
async function seedDemoData() {
    try {
        const flag = await safeGet("seed:demo_v1", true);
        if (flag)
            return;
        const existing = await safeList("report:", true);
        if (existing && existing.keys && existing.keys.length > 0) {
            await safeSet("seed:demo_v1", "1", true);
            return;
        }
        const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
        for (let dn = 9; dn >= 0; dn--) {
            const day = addDays(todayIso(), -dn);
            const baseRevenue = rnd(8, 16) * 1000000;
            for (const st of SAMPLE_STAFF) {
                const pos = posById(st.posId);
                if (!pos)
                    continue;
                for (const type of ["moca", "cuoica"]) {
                    const cp = pos.checkpoints[type];
                    if (!cp)
                        continue;
                    if (Math.random() < 0.12)
                        continue; /* ~12% absent/forgot */
                    const total = cp.items.length;
                    const pct = rnd(72, 100);
                    const doneCount = Math.round((total * pct) / 100);
                    const eos = {};
                    (cp.fields || []).forEach((f) => {
                        if (f.k === "doanhthu")
                            eos.doanhthu = String(baseRevenue);
                        else if (f.k === "tienmat")
                            eos.tienmat = String(baseRevenue - rnd(0, 50000));
                        else if (f.flag)
                            eos[f.k] = Math.random() < 0.12 ? "Có sự cố nhỏ trong ca, đã xử lý" : "Không";
                        else if (f.k === "phanhoi")
                            eos[f.k] = "Khách phản hồi tích cực";
                        else if (f.k === "dexuat")
                            eos[f.k] = "Đề xuất nhập thêm nguyên liệu tươi";
                    });
                    const scored = Math.random() < 0.7;
                    const scores = scored ? { chuanbi: rnd(3, 5), chuyenmon: rnd(3, 5), phoihop: rnd(3, 5), thaido: rnd(4, 5) } : null;
                    const hour = type === "moca" ? rnd(7, 9) : rnd(21, 23);
                    const submittedAt = new Date(day + "T" + pad2(hour) + ":" + pad2(rnd(0, 59)) + ":00").toISOString();
                    const id = "report:demo_" + day + "_" + st.id + "_" + type;
                    const payload = { id, staffId: st.id, name: st.name, posId: st.posId, posName: pos.name, role: pos.role, type, typeLabel: PHASE[type].label, venue: VENUE, submittedAt, doneCount, total, pct, checks: {}, eos, scores, reviewed: !!scored };
                    await safeSet(id, JSON.stringify(payload), true);

    }
